<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HERMES</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2937;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #111827, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1100px, 92vw);
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(3px);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 64px;
      gap: 10px;
    }

    .brand-link img {
      display: block;
      height: 32px;
      width: auto;
      border-radius: 2px;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: center;
      padding: 42px 0 56px;
    }

    .hero-logo {
      width: min(100%, 640px);
      height: auto;
      display: block;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(2rem, 4.2vw, 3.2rem);
      letter-spacing: 0.08em;
    }

    .tagline {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 2.1vw, 1.1rem);
    }

    .video-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(17, 24, 39, 0.65);
      overflow: hidden;
      max-width: 360px;
      justify-self: end;
      opacity: 0.7;
    }

    .video-card video {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 860px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .video-card {
        justify-self: start;
        max-width: 280px;
      }
    }

    @media (max-width: 560px) {
      .nav {
        min-height: 56px;
      }

      .brand-link img {
        height: 28px;
      }

      .hero {
        padding: 28px 0 38px;
      }

      .video-card {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a class="brand-link" href="./" aria-label="HERMES home">
        <img src="assets/hermes-logo-h.jpg" alt="HERMES H logo" />
      </a>
    </div>
  </header>

  <main class="wrap hero">
    <section>
      <img class="hero-logo" src="assets/hermes-logo-hermes.jpg" alt="HERMES logo wordmark" />
      <h1>HERMES</h1>
      <p class="tagline">Placeholder tagline describing the HERMES system.</p>
    </section>

    <aside class="video-card" aria-label="HERMES animation preview">
      <video autoplay muted loop playsinline preload="metadata">
        <source src="assets/hermes-logo-animation.mp4" type="video/mp4" />
      </video>
    </aside>
  </main>
</body>
</html>
