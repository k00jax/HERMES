name: hermes-brain-tests

on:
  push:
    branches: [main, master]
    paths:
      - "hermes-brain/**"
      - ".github/workflows/hermes-brain-tests.yml"
  pull_request:
    paths:
      - "hermes-brain/**"
      - ".github/workflows/hermes-brain-tests.yml"

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-brain
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "hermes-brain/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
