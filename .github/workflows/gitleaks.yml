# Secret scanning on every push and PR (full history on default branch pushes).
# Docs: https://github.com/gitleaks/gitleaks-action
name: gitleaks

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
